<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Leo Planer</title>
        <link rel="stylesheet" href="../style/essentials.css">
        <link rel="stylesheet" href="../style/dashboard.css">
        <script src="https://kit.fontawesome.com/7dd0aadbc3.js" crossorigin="anonymous"></script>
        <script type="module" src="../dist/js/pages/dashboard.js" defer></script>
        <script type="module" src="../dist/js/pages/navbar.js" defer></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    </head>

    <body>
        <div class="flex-container">

            <div id="nav-bar"></div>

            <div id="main-content">
                <div id="dashboard">

                    <header id="dashboard-header">
                        <h1 id="dashboard-title">Dashboard</h1>
                        <p id="dashboard-subtitle">
                            Willkommen bei LeoPlaner. Verwalten Sie Ihre Schuldaten und erstellen Sie optimierte Stundenpläne.
                        </p>
                    </header>

                    <section id="stats-grid" class="dashboard-grid">
                        <!-- Stat cards generated in JavaScript -->
                    </section>

                    <section class="dashboard-section">
                        <h2 class="section-heading">Schnellaktionen</h2>
                        <div id="quick-actions" class="dashboard-grid">
                            <!-- Quick action cards generated in JavaScript -->
                        </div>
                    </section>

                    <section class="dashboard-section">
                        <h2 class="section-heading">Datenverwaltung</h2>
                        <div id="data-management" class="dashboard-grid">
                            <!-- Data management links generated in JavaScript -->
                        </div>
                    </section>

                </div>
            </div>
        </div>
    </body>

</html>
