<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable</title>
    <link rel="stylesheet" href="../style/essentials.css">
    <link rel="stylesheet" href="../style/timetable.css">
    <script type="module" defer src="../dist/js/pages/navbar.js"></script>
    <script type="module" src="../dist/js/pages/timetable.js"></script>
    <script type="module" src="../dist/js/pages/graph.js"></script>
    <script src="https://kit.fontawesome.com/7dd0aadbc3.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="loader" style="display: none;"></div>
    <div id="optimizing-text" style="display: none;">Optimierung Ihres Stundenplans...</div>
    <div id="disable-overlay"></div>

    <div class="flex-container">

        <div id="nav-bar"></div>

        <div id="main-content">

            <div id="top-bar">
                <h1 id="title">Stundenplan</h1>

                <div id="middle-console">
                    <div class="top-bar-select" id="classes">
                        <button class="select-trigger">Klassen</button>
                        <ul class="select-menu">
                        </ul>
                    </div>

                    <div class="top-bar-select" id="teachers">
                        <button class="select-trigger">Lehrer</button>
                        <ul class="select-menu" id="select-teachers">
                        </ul>
                    </div>

                    <div class="top-bar-select" id="rooms">
                        <button class="select-trigger">R&auml;ume</button>
                        <ul class="select-menu">
                        </ul>
                    </div>

                    <div class="top-bar-select" id="back">
                        <button class="select-trigger" onclick="clearChoice()">Zurücksetzen</button>
                    </div>

                    <div class="top-bar-btn" id="filter">
                        <div><i class="fa-solid fa-filter"></i></div>
                    </div>
                    <div class="top-bar-btn" id="share">
                        <div><i class="fa-solid fa-share-nodes"></i></div>
                    </div>
                    <div class="top-bar-btn" id="print">
                        <div><i class="fa-solid fa-print"></i></div>
                    </div>
                </div>

                <div class="top-bar-btn" id="randomizeButton" onclick="getRandomizedTimeTable()">
                    <div><i class="fa-solid fa-dice"></i></div>
                </div>

                <div class="top-bar-btn" id="algorithmButton">
                    <div><i class="fa-solid fa-chart-line"></i></div>
                </div>
            </div>

            <!--New Timetable-->
            <div id="flex-inner-container">
            <div id="timetable">
                <div id="timetable-content">
                    <div id="timetable-day-name">
                        <div></div>
                        <div>Mo</div>
                        <div>Di</div>
                        <div>Mi</div>
                        <div>Do</div>
                        <div>Fr</div>
                        <div>Sa</div>
                    </div>
                    <div id="timetable-view">
                        <div id="timetable-background">
                            <!-- autogen dummy blocks js (!with break!) -->
                        </div>

                        <div id="timetable-times">
                            <!-- autogen times js (!with break!) -->
                        </div>
                        <div id="timetable-days">
                            <div class="school-days" id="MONDAY">
                                <div class="periods"></div>
                            </div>

                            <div class="school-days" id="TUESDAY">
                                <div class="periods"></div>
                            </div>

                            <div class="school-days" id="WEDNESDAY">
                                <div class="periods"></div>
                            </div>

                            <div class="school-days" id="THURSDAY">
                                <div class="periods"></div>
                            </div>

                            <div class="school-days" id="FRIDAY">
                                <div class="periods"></div>
                            </div>

                            <div class="school-days" id="SATURDAY">
                                <div class="periods"></div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
            <div id="graph-container">
                <!--<div class="graph-box" style="padding: 0.3vw;">
                    <div id="temperatureChart" style="width: 20vw;height:40vh;"></div>
                </div>-->
                <div class="graph-box" style="padding: 0.3vw;">
                    <div id="costChart" style="width: 21vw;height:50vh;"></div>
                </div>
                <div id="slider-container">
                    <div id="tooltip" class="slider-tooltip">1000</div>
                    <input type="range" min="0" max="1000" value="0" id="temperatureSlider" autocomplete="off">
                    <div id="slider-values">
                        <div class="slider-value"><p class="slider-line">|</p><p>1000</p></div>
                        <div class="slider-value"><p class="slider-line">|</p><p>500</p></div>
                        <div class="slider-value"><p class="slider-line">|</p><p>0</p></div>
                    </div>
                </div>
                <div id="button">
                    <button id="optimizeButton">Pausiere die Optimierung</button>
                </div>
            </div>
            </div>


            <!--Old Timetable
            <div id="timetable-content">
                <div id="scroll-table-container">
                    <div id="days">

                        <div class="day" id="day0">
                            <p class="headlineP"><br></p>
                            <div class="gridBoxDays" id="gridBoxTimeSchedules"></div>
                        </div>

                        <div class="day" class="SchoolDays" id="MONDAY">
                            <p class="headlineP">Mon</p>
                            <div class="gridBoxDays"></div>
                        </div>

                        <div class="day" class="SchoolDays" id="TUESDAY">

                        </div>

                        <div class="day" class="SchoolDays" id="WEDNESDAY">
                            <p class="headlineP">Wed</p>
                            <div class="gridBoxDays"></div>
                        </div>

                        <div class="day" class="SchoolDays" id="THURSDAY">
                            <p class="headlineP">Thu</p>
                            <div class="gridBoxDays"></div>
                        </div>

                        <div class="day" class="SchoolDays" id="FRIDAY">
                            <p class="headlineP">Fri</p>
                            <div class="gridBoxDays"></div>
                        </div>

                        <div class="day" class="SchoolDays" id="SATURDAY">
                            <p class="headlineP">Sat</p>
                            <div class="gridBoxDays"></div>
                        </div>

                    </div>
                </div>
            </div>
        -->
        </div>
        
    </div>
    
    <div id="cost-container">Kosten: </div>

</body>

</html>
