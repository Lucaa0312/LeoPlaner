<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&auml;cher</title>
    <link rel="stylesheet" href="../style/essentials.css">
    <link rel="stylesheet" href="../style/subjects.css">
    <script type="module" defer src="../dist/js/pages/subjects.js"></script>
    <script type="module" defer src="../dist/js/pages/navbar.js"></script>

    <script src="https://kit.fontawesome.com/7dd0aadbc3.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="flex-container">

        <div id="nav-bar"></div>

        <div id="main-content">
            <div class="flex-row" id="subjects-header">
                <div id="header-section">
                    <h1 id="header-text">F&auml;cher</h1>
                    <p id="header-subtext">Verwalten Sie Ihre F&auml;cher</p>
                </div>
                <div id="controls">
                    <div id="search-bar">
                        <input type="text" id="input-field" placeholder="Nach F&auml;chern suchen">
                        <img id="search-icon" src="../assets/img/magnifyingGlass.png" alt="Suchsymbol">
                    </div>
                    <div id="add-btn">
                        <i class="fa-solid fa-plus"></i>
                        <p>Fach hinzufügen</p>
                        <svg width="38" height="52" viewBox="0 0 38 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="15.5" cy="35.5635" r="13.5" stroke="#F59E0B" stroke-width="4"/>
                            <circle cx="15.5" cy="35.5635" r="5.5" fill="#F59E0B"/>
                            <path d="M18.2522 23.9424C17.5417 27.0787 21.5948 28.9833 23.5557 26.4346L37.0636 8.8783C38.2323 7.3593 37.6964 5.1489 35.9618 4.33377L27.3485 0.286163C25.6139 -0.528969 23.5702 0.469229 23.1467 2.33844L18.2522 23.9424Z" fill="#F59E0B"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div id="display-subjects">
                <!-- Generated in JavaScript -->
            </div>

            <div id="disable-overlay">
                <div id="add-subject-screen">
                <!-- Generated in JavaScript -->
                </div>
            </div>


            <div id="no-subjects" style="display: block;">
                <p>Es wurden noch keine F&auml;cher hinzugefügt.</p>
                <p>...</p>
            </div>
        </div>

    </div>
    
</body>
</html>
