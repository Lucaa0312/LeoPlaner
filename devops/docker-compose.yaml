include:
  - path: ../database/docker-compose.yaml

services:
  postgres:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 2s
      timeout: 3s
      retries: 30

  leo-planer:
    build:
      context: ../leo-planer
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/demo
      QUARKUS_DATASOURCE_USERNAME: demo
      QUARKUS_DATASOURCE_PASSWORD: demo
      QUARKUS_HTTP_HOST: 0.0.0.0

    
    volumes:
      - ../leo-planer:/workspace
      - m2:/root/.m2
  

volumes:
  m2:
